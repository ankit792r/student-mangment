server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip
    gzip on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # SPA routing (works with TanStack Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache Vite's hashed assets
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Don't cache the entry point
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache";
    }
}
